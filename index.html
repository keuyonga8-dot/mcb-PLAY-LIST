<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Character List Archive</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
    --bg: #f8f3ec;
    --paper: #fffefa;
    --paper2: #fdf8f1;
    --ink: #3c372f;
    --sub: #8a7d6d;
    --line: #eadfce;

    --play: #36a77f;
    --plan: #e8a11f;
    --new: #b7aca1;
    --love: #e05f86;

    --play-bg: #c9efdf;
    --plan-bg: #ffe29c;
    --new-bg: #f5f0ea;
    --love-bg: #ffe4ed;

    --water: #6da9c9;
    --fire: #cf8275;
    --wind: #83b98f;
    --ice: #8ec6d0;
    --lightning: #d1aa48;
    --grass: #8cb878;
    --neutral: #aaa0c9;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: Pretendard, "Noto Sans KR", system-ui, sans-serif;
}

.page {
    width: 1080px;
    max-width: calc(100% - 24px);
    margin: 0 auto;
    padding: 18px 0 28px;
}

#capture-area {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 18px;
    box-shadow: 0 14px 35px rgba(85, 64, 42, .10);
}

.header {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: center;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 12px;
}

h1 {
    margin: 0;
    font-size: 25px;
    letter-spacing: -.05em;
    line-height: 1;
}

.desc {
    margin: 7px 0 0;
    font-size: 11px;
    color: var(--sub);
    font-weight: 600;
}

.counts {
    display: flex;
    gap: 7px;
}

.count {
    width: 78px;
    padding: 7px 8px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--paper2);
    text-align: center;
}

.count span {
    display: block;
    font-size: 9px;
    color: var(--sub);
    font-weight: 900;
}

.count b {
    display: block;
    font-size: 18px;
    margin-top: 1px;
}

.toolbar {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 12px;
}

.tabs, .actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}

button {
    font-family: inherit;
    border: 1px solid var(--line);
    background: var(--paper2);
    color: var(--sub);
    border-radius: 999px;
    padding: 7px 11px;
    font-size: 11px;
    font-weight: 900;
    cursor: pointer;
}

button.active {
    background: #3c372f;
    color: #fffdf8;
    border-color: #3c372f;
}

button.primary {
    background: #86b8a4;
    border-color: #86b8a4;
    color: #fff;
}

.legend {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
}

.legend-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 900;
    color: var(--sub);
}

.status-sample {
    min-width: 42px;
    text-align: center;
    border-radius: 7px;
    padding: 3px 6px;
    font-size: 8px;
    letter-spacing: .05em;
    border: 1px solid;
}

.status-sample.play { color: #4e806d; background: var(--play-bg); border-color: var(--play); }
.status-sample.plan { color: #916d2d; background: var(--plan-bg); border-color: var(--plan); }
.status-sample.new { color: #766d63; background: var(--new-bg); border-color: var(--new); }
.status-sample.love { color: #a55265; background: var(--love-bg); border-color: var(--love); }

.section {
    margin-top: 10px;
    border: 1px solid var(--line);
    border-radius: 15px;
    overflow: hidden;
    background: #fffaf3;
}

.section-head {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 8px 10px;
    background: var(--paper2);
    border-bottom: 1px solid var(--line);
}

.section-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 950;
    letter-spacing: -.03em;
}

.team-progress {
    font-size: 9px;
    color: var(--sub);
    font-weight: 900;
    padding: 3px 7px;
    border-radius: 999px;
    background: #fffdf8;
    border: 1px solid var(--line);
}

.section-count {
    font-size: 9px;
    color: var(--sub);
    font-weight: 900;
}

.grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 0;
}

.item {
    min-height: 52px;
    display: grid;
    grid-template-columns: 20px 1fr 22px;
    gap: 7px;
    align-items: center;
    padding: 7px 8px;
    border-right: 1px solid #e3d5c1;
    border-bottom: 1px solid #e3d5c1;
    background: #fffdf8;
    cursor: pointer;
    position: relative;
    transition: .15s ease;
}

.item:nth-child(6n) { border-right: 0; }

.item.play {
    background: var(--play-bg);
}

.item.plan {
    background: var(--plan-bg);
}

.item.new {
    background: #fffefa;
}

.item.love::after {
    content: "♥";
    position: absolute;
    top: 5px;
    right: 8px;
    color: var(--love);
    font-size: 12px;
    line-height: 1;
    font-weight: 1000;
    pointer-events: none;
}

.item:hover {
    filter: brightness(.985);
}

.item:active {
    filter: brightness(.95);
}

.check {
    width: 18px;
    height: 18px;
    border-radius: 5px;
    display: grid;
    place-items: center;
    font-size: 12px;
    font-weight: 1000;
    border: 1px solid;
    background: #fff;
}

.item.play .check {
    background: #fff;
    border-color: var(--play);
    color: #4e806d;
}

.item.plan .check {
    background: #fff;
    border-color: var(--plan);
    color: #916d2d;
}

.item.new .check {
    background: #fff;
    border-color: var(--new);
    color: #766d63;
}

.name-row {
    display: block;
    min-width: 0;
}

.name {
    font-size: 13px;
    font-weight: 950;
    line-height: 1.05;
    letter-spacing: -.04em;
}

button.love-btn {
    width: 20px;
    height: 20px;
    display: grid;
    place-items: center;
    border-radius: 8px;
    border: 1px solid transparent;
    background: transparent;
    color: rgba(138,125,109,.16);
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    font-family: inherit;
    font-weight: 1000;
}

.item:hover .love-btn {
    color: rgba(138,125,109,.38);
    background: rgba(255,255,255,.35);
    border-color: rgba(226,213,195,.55);
}

@media (hover: none) {
    .love-btn {
        color: rgba(138,125,109,.38);
        background: rgba(255,255,255,.35);
        border-color: rgba(226,213,195,.55);
    }
}

.item.love .love-btn {
    background: var(--love);
    border-color: var(--love);
    color: #fff;
    box-shadow: 0 0 0 2px rgba(224,95,134,.18);
}

.meta {
    margin-top: 4px;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
}

.chip {
    font-size: 8px;
    font-weight: 950;
    color: var(--sub);
    line-height: 1;
    padding: 3px 5px;
    border-radius: 999px;
    background: #f3eadf;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.chip.rank {
    flex-shrink: 0;
    background: #eee4d8;
}

.chip.team {
    flex-shrink: 0;
    max-width: 100%;
}

.right-tools {
    display: flex;
    align-items: center;
    justify-content: flex-end;
}

.status {
    display: none;
}

.water { color: #317c9f; background: rgba(109,169,201,.18); }
.fire { color: #a25448; background: rgba(207,130,117,.18); }
.wind { color: #4e865c; background: rgba(131,185,143,.18); }
.ice { color: #4a8993; background: rgba(142,198,208,.18); }
.lightning { color: #8b6d1f; background: rgba(209,170,72,.18); }
.grass { color: #5b874a; background: rgba(140,184,120,.18); }
.neutral { color: #756aa0; background: rgba(170,160,201,.18); }

.status-board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.status-board .grid {
    grid-template-columns: 1fr;
}

.status-board .item {
    border-right: 0;
}

.compact .grid {
    grid-template-columns: repeat(6, 1fr);
}

.compact .item {
    min-height: 47px;
    padding: 6px 7px;
    grid-template-columns: 17px 1fr 20px;
    gap: 5px;
}

.compact .check {
    width: 15px;
    height: 15px;
    font-size: 9px;
}

.compact .name { font-size: 11px; }
.compact .chip { font-size: 7px; padding: 3px 4px; }
.compact .status { font-size: 7px; padding: 4px 5px; }
.compact .love-btn { width: 17px; height: 17px; font-size: 10px; border-radius: 7px; }

.compact .desc, .compact .legend { display: none; }

@media (max-width: 900px) {
    .page { padding: 12px 0 20px; }
    .header, .toolbar { grid-template-columns: 1fr; display: flex; flex-direction: column; align-items: stretch; }
    .counts { width: 100%; flex-wrap: wrap; }
    .count { flex: 1; min-width: calc(50% - 4px); }
    .grid, .compact .grid { grid-template-columns: repeat(2, 1fr); }
    .item:nth-child(6n) { border-right: 1px solid #e3d5c1; }
    .item:nth-child(2n) { border-right: 0; }
    .status-board { grid-template-columns: 1fr; }
    h1 { font-size: 22px; }
    .legend { gap: 6px; }
}

@media (max-width: 480px) {
    .grid, .compact .grid { grid-template-columns: 1fr; }
    .item { border-right: 0 !important; }
    .counts { gap: 5px; }
    .count { min-width: calc(50% - 3px); padding: 6px; }
}
</style>
</head>
<body>
<div class="page">
    <main id="capture-area">
        <div class="header">
            <div>
                <h1>CHARACTER PLAY LIST</h1>
            </div>
            <div class="counts">
                <div class="count"><span>플레이</span><b id="playCount">0</b></div>
                <div class="count"><span>예정</span><b id="planCount">0</b></div>
                <div class="count"><span>미플레이</span><b id="newCount">0</b></div>
                <div class="count"><span>애정</span><b id="loveCount">0</b></div>
            </div>
        </div>

        <div class="toolbar">
            <div class="tabs">
                <button class="active" id="tab-group" onclick="setMode('group')">팀별</button>
                <button id="tab-status" onclick="setMode('status')">상태별</button>
                <button id="tab-attr" onclick="setMode('attr')">속성별</button>
                <button id="tab-love" onclick="setMode('love')">애정</button>
            </div>
            <div class="actions">
                <button onclick="toggleCompact()">작게/보통</button>
                <button onclick="resetAll()">초기화</button>
                <button class="primary" onclick="savePNG()">PNG 저장</button>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item"><span class="status-sample play">색</span> 플레이</div>
            <div class="legend-item"><span class="status-sample plan">색</span> 플레이 예정</div>
            <div class="legend-item"><span class="status-sample new">색</span> 미플레이</div>
            <div class="legend-item"><span class="status-sample love">LOVE</span> 애정 캐릭터</div>
        </div>

        <div id="content"></div>
    </main>
</div>

<script>
const attrClass = {
    "물": "water", "불": "fire", "바람": "wind", "얼음": "ice",
    "번개": "lightning", "풀": "grass", "무속성": "neutral"
};

const statusClass = ["new", "plan", "play"];
const statusLabel = ["", "PLAN", "PLAY"];
const checkMark = ["", "◇", "✓"];

let mode = "group";

let chars = [
    { g:"ARCH-PRIMA", short:"AP", rank:"SS", n:"해일", a:"물", s:0, love:false },
    { g:"ARCH-PRIMA", short:"AP", rank:"SS", n:"이카로스", a:"바람", s:0, love:false },
    { g:"ARCH-PRIMA", short:"AP", rank:"SS", n:"산타", a:"얼음", s:0, love:false },
    { g:"ARCH-PRIMA", short:"AP", rank:"SS", n:"헬리오스", a:"불", s:0, love:false },

    { g:"VANGUARD 1팀", short:"V1", rank:"S", n:"애쉬", a:"불", s:0, love:false },
    { g:"VANGUARD 1팀", short:"V1", rank:"S", n:"셰인", a:"바람", s:0, love:false },
    { g:"VANGUARD 1팀", short:"V1", rank:"S", n:"오버로드", a:"번개", s:0, love:false },
    { g:"VANGUARD 1팀", short:"V1", rank:"S", n:"노아", a:"물", s:0, love:false },
    { g:"VANGUARD 1팀", short:"V1", rank:"S", n:"아모레", a:"풀", s:0, love:false },
    { g:"VANGUARD 1팀", short:"V1", rank:"S", n:"라임", a:"얼음", s:0, love:false },

    { g:"VANGUARD 2팀", short:"V2", rank:"S", n:"리암", a:"얼음", s:0, love:false },
    { g:"VANGUARD 2팀", short:"V2", rank:"S", n:"신드롬", a:"불", s:0, love:false },
    { g:"VANGUARD 2팀", short:"V2", rank:"S", n:"바이브", a:"바람", s:0, love:false },

    { g:"AGENT", short:"AG", rank:"A-B", n:"샤드", a:"얼음", s:0, love:false },
    { g:"AGENT", short:"AG", rank:"A-B", n:"카토", a:"풀", s:0, love:false },
    { g:"AGENT", short:"AG", rank:"A", n:"루비", a:"불", s:0, love:false },

    { g:"ACOLYTE", short:"AC", rank:"C", n:"피카", a:"번개", s:0, love:false },
    { g:"ACOLYTE", short:"AC", rank:"C", n:"블루", a:"물", s:0, love:false },

    { g:"HARMONY SUPPORT", short:"HS", rank:"S", n:"윈터", a:"얼음", s:0, love:false },
    { g:"HARMONY SUPPORT", short:"HS", rank:"S", n:"오아시스", a:"물", s:0, love:false },
    { g:"HARMONY SUPPORT", short:"HS", rank:"S", n:"자이안", a:"풀", s:0, love:false },
    { g:"HARMONY SUPPORT", short:"HS", rank:"S", n:"스트레이", a:"번개", s:0, love:false },

    { g:"HARMONY R.S.T", short:"HR", rank:"S", n:"에덴", a:"바람", s:0, love:false },
    { g:"HARMONY R.S.T", short:"HR", rank:"S", n:"휴고", a:"불", s:0, love:false },
    { g:"HARMONY R.S.T", short:"HR", rank:"S", n:"카르마", a:"번개", s:0, love:false },

    { g:"HARMONY CORE", short:"HC", rank:"A", n:"퓨어", a:"무속성", s:0, love:false },
    { g:"HARMONY CORE", short:"HC", rank:"S", n:"밴스", a:"풀", s:0, love:false }
];

function load() {
    const saved = localStorage.getItem("character-list-archive-love-progress");
    if (!saved) return;
    try {
        const data = JSON.parse(saved);
        chars.forEach(c => {
            if (data[c.n]) {
                if (typeof data[c.n].s === "number") c.s = data[c.n].s;
                if (typeof data[c.n].love === "boolean") c.love = data[c.n].love;
            }
        });
    } catch(e) {}
}

function save() {
    const data = {};
    chars.forEach(c => data[c.n] = { s: c.s, love: c.love });
    localStorage.setItem("character-list-archive-love-progress", JSON.stringify(data));
}

function setMode(next) {
    mode = next;
    document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
    document.getElementById("tab-" + next).classList.add("active");
    render();
}

function toggleCompact() {
    document.getElementById("capture-area").classList.toggle("compact");
}

function updateCounts() {
    playCount.textContent = chars.filter(c => c.s === 2).length;
    planCount.textContent = chars.filter(c => c.s === 1).length;
    newCount.textContent = chars.filter(c => c.s === 0).length;
    loveCount.textContent = chars.filter(c => c.love).length;
}

function groupProgress(list) {
    const played = list.filter(c => c.s === 2).length;
    return `${played}/${list.length} 플레이`;
}

function makeItem(c) {
    const item = document.createElement("div");
    item.className = "item " + statusClass[c.s] + (c.love ? " love" : "");
    item.innerHTML = `
        <div class="check">${checkMark[c.s]}</div>
        <div>
            <div class="name-row">
                <div class="name">${c.n}</div>
            </div>
            <div class="meta">
                <span class="chip ${attrClass[c.a]}">${c.a}</span>
                <span class="chip rank">${c.rank}</span>
                <span class="chip team" title="${c.g}">${c.g}</span>
            </div>
        </div>
        <div class="right-tools">
            <button type="button" class="love-btn" title="애정 캐릭터 체크" aria-label="애정 캐릭터 체크">♥</button>
        </div>
    `;

    item.onclick = () => {
        c.s = (c.s + 1) % 3;
        save();
        render();
    };

    item.querySelector(".love-btn").onclick = (e) => {
        e.stopPropagation();
        c.love = !c.love;
        save();
        render();
    };

    return item;
}

function section(title, list) {
    const wrap = document.createElement("section");
    wrap.className = "section";
    wrap.innerHTML = `
        <div class="section-head">
            <div class="section-title">
                ${title}
                <span class="team-progress">${groupProgress(list)}</span>
            </div>
            <div class="section-count">${list.length}명</div>
        </div>
        <div class="grid"></div>
    `;
    const grid = wrap.querySelector(".grid");
    list.forEach(c => grid.appendChild(makeItem(c)));
    return wrap;
}

function render() {
    updateCounts();

    const root = document.getElementById("content");
    root.innerHTML = "";

    if (mode === "group") {
        root.className = "";
        ["ARCH-PRIMA", "VANGUARD 1팀", "VANGUARD 2팀", "AGENT", "ACOLYTE", "HARMONY SUPPORT", "HARMONY R.S.T", "HARMONY CORE"]
            .forEach(g => root.appendChild(section(g, chars.filter(c => c.g === g))));
    }

    if (mode === "status") {
        root.className = "status-board";
        root.appendChild(section("플레이", chars.filter(c => c.s === 2)));
        root.appendChild(section("플레이 예정", chars.filter(c => c.s === 1)));
        root.appendChild(section("미플레이", chars.filter(c => c.s === 0)));
    }

    if (mode === "attr") {
        root.className = "";
        ["물", "불", "바람", "얼음", "번개", "풀", "무속성"].forEach(a => {
            const list = chars.filter(c => c.a === a);
            if (list.length) root.appendChild(section(a + " 속성", list));
        });
    }

    if (mode === "love") {
        root.className = "";
        root.appendChild(section("애정 캐릭터", chars.filter(c => c.love)));
    }
}

function resetAll() {
    if (!confirm("모든 상태와 애정 체크를 초기화할까요?")) return;
    chars.forEach(c => { c.s = 0; c.love = false; });
    save();
    render();
}

function savePNG() {
    const target = document.querySelector("#capture-area");
    const originalShadow = target.style.boxShadow;
    target.style.boxShadow = "none";

    html2canvas(target, {
        backgroundColor: "#fffefa",
        scale: 3,
        useCORS: true,
        windowWidth: 1080
    }).then(canvas => {
        target.style.boxShadow = originalShadow;
        const link = document.createElement("a");
        link.download = "character-list-archive.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    }).catch(err => {
        target.style.boxShadow = originalShadow;
        console.error(err);
    });
}

load();
render();
</script>
</body>
</html>
