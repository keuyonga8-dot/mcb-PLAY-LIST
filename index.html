<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Character List Archive</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
    --bg: #f8f3ec;
    --paper: #fffefa;
    --paper2: #fdf8f1;
    --ink: #3c372f;
    --sub: #8a7d6d;
    --line: #eadfce;

    --play: #36a77f;
    --plan: #e8a11f;
    --new: #b7aca1;
    --love: #e05f86;

    --play-bg: #c9efdf;
    --plan-bg: #ffe29c;
    --new-bg: #f5f0ea;
    --love-bg: #ffe4ed;

    --water: #6da9c9;
    --fire: #cf8275;
    --wind: #83b98f;
    --ice: #8ec6d0;
    --lightning: #d1aa48;
    --grass: #8cb878;
    --neutral: #aaa0c9;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: Pretendard, "Noto Sans KR", system-ui, sans-serif;
}

.page {
    width: 1080px;
    max-width: calc(100% - 24px);
    margin: 0 auto;
    padding: 18px 0 28px;
}

#capture-area {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 18px;
    box-shadow: 0 14px 35px rgba(85, 64, 42, .10);
}

.header {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: center;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 12px;
}

h1 {
    margin: 0;
    font-size: 25px;
    letter-spacing: -.05em;
    line-height: 1;
}

.desc {
    margin: 7px 0 0;
    font-size: 11px;
    color: var(--sub);
    font-weight: 600;
}

.counts {
    display: flex;
    gap: 7px;
}

.count {
    width: 78px;
    padding: 7px 8px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--paper2);
    text-align: center;
}

.count span {
    display: block;
    font-size: 9px;
    color: var(--sub);
    font-weight: 900;
}

.count b {
    display: block;
    font-size: 18px;
    margin-top: 1px;
}

.toolbar {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 12px;
}

.tabs, .actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}

button {
    font-family: inherit;
    border: 1px solid var(--line);
    background: var(--paper2);
    color: var(--sub);
    border-radius: 999px;
    padding: 7px 11px;
    font-size: 11px;
    font-weight: 900;
    cursor: pointer;
}

button.active {
    background: #3c372f;
    color: #fffdf8;
    border-color: #3c372f;
}

button.primary {
    background: #86b8a4;
    border-color: #86b8a4;
    color: #fff;
}

.legend {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
}

.legend-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 900;
    color: var(--sub);
}

.status-sample {
    min-width: 42px;
    text-align: center;
    border-radius: 7px;
    padding: 3px 6px;
    font-size: 8px;
    letter-spacing: .05em;
    border: 1px solid;
}

.status-sample.play { color: #4e806d; background: var(--play-bg); border-color: var(--play); }
.status-sample.plan { color: #916d2d; background: var(--plan-bg); border-color: var(--plan); }
.status-sample.new { color: #766d63; background: var(--new-bg); border-color: var(--new); }
.status-sample.love { color: #a55265; background: var(--love-bg); border-color: var(--love); }

.section {
    margin-top: 10px;
    border: 1px solid var(--line);
    border-radius: 15px;
    overflow: hidden;
    background: #fffaf3;
}

.section-head {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 8px 10px;
    background: var(--paper2);
    border-bottom: 1px solid var(--line);
}

.section-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 950;
    letter-spacing: -.03em;
}

.team-progress {
    font-size: 9px;
    color: var(--sub);
    font-weight: 900;
    padding: 3px 7px;
    border-radius: 999px;
    background: #fffdf8;
    border: 1px solid var(--line);
}

.section-count {
    font-size: 9px;
    color: var(--sub);
    font-weight: 900;
}

.grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 0;
}

.item {
    min-height: 60px;
    display: grid;
    grid-template-columns: 20px 1fr 22px;
    gap: 7px;
    align-items: center;
    padding: 7px 8px;
    border-right: 1px solid #e3d5c1;
    border-bottom: 1px solid #e3d5c1;
    background: #fffdf8;
    cursor: pointer;
    position: relative;
    transition: .15s ease;
}

.item:nth-child(6n) { border-right: 0; }

.item.play {
    background: var(--play-bg);
}

.item.plan {
    background: var(--plan-bg);
}

.item.new {
    background: #fffefa;
}

.item.love::after {
    content: "♥";
    position: absolute;
    top: 5px;
    right: 8px;
    color: var(--love);
    font-size: 12px;
    line-height: 1;
    font-weight: 1000;
    pointer-events: none;
}

.item:hover {
    filter: brightness(.985);
}

.item:active {
    filter: brightness(.95);
}

.check {
    width: 18px;
    height: 18px;
    border-radius: 5px;
    display: grid;
    place-items: center;
    font-size: 12px;
    font-weight: 1000;
    border: 1px solid;
    background: #fff;
}

.item.play .check {
    background: #fff;
    border-color: var(--play);
    color: #4e806d;
}

.item.plan .check {
    background: #fff;
    border-color: var(--plan);
    color: #916d2d;
}

.item.new .check {
    background: #fff;
    border-color: var(--new);
    color: #766d63;
}

.name-row {
    display: block;
    min-width: 0;
}

.name {
    font-size: 13px;
    font-weight: 950;
    line-height: 1.05;
    letter-spacing: -.04em;
}

button.love-btn {
    width: 20px;
    height: 20px;
    display: grid;
    place-items: center;
    border-radius: 8px;
    border: 1px solid transparent;
    background: transparent;
    color: rgba(138,125,109,.16);
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    font-family: inherit;
    font-weight: 1000;
}

.item:hover .love-btn {
    color: rgba(138,125,109,.38);
    background: rgba(255,255,255,.35);
    border-color: rgba(226,213,195,.55);
}

@media (hover: none) {
    .love-btn {
        color: rgba(138,125,109,.38);
        background: rgba(255,255,255,.35);
        border-color: rgba(226,213,195,.55);
    }
}

.item.love .love-btn {
    background: var(--love);
    border-color: var(--love);
    color: #fff;
    box-shadow: 0 0 0 2px rgba(224,95,134,.18);
}

.meta {
    margin-top: 4px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
}

.meta-row {
    display: flex;
    gap: 3px;
    align-items: center;
    flex-wrap: nowrap;
    min-width: 0;
}

.chip {
    font-size: 8px;
    font-weight: 950;
    color: var(--sub);
    line-height: 1;
    padding: 3px 5px;
    border-radius: 999px;
    background: #f3eadf;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex-shrink: 0;
}

.chip.rank {
    background: #eee4d8;
}

.chip.team {
    flex-shrink: 1;
    min-width: 0;
    align-self: flex-start;
}

.right-tools {
    display: flex;
    align-items: center;
    justify-content: flex-end;
}

.status {
    display: none;
}

.water { color: #317c9f; background: rgba(109,169,201,.18); }
.fire { color: #a25448; background: rgba(207,130,117,.18); }
.wind { color: #4e865c; background: rgba(131,185,143,.18); }
.ice { color: #4a8993; background: rgba(142,198,208,.18); }
.lightning { color: #8b6d1f; background: rgba(209,170,72,.18); }
.grass { color: #5b874a; background: rgba(140,184,120,.18); }
.neutral { color: #756aa0; background: rgba(170,160,201,.18); }

.status-board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

.status-board .grid {
    grid-template-columns: 1fr;
}

.status-board .item {
    border-right: 0;
}

.compact .grid {
    grid-template-columns: repeat(6, 1fr);
}

.compact .item {
    min-height: 55px;
    padding: 6px 7px;
    grid-template-columns: 17px 1fr 20px;
    gap: 5px;
}

.compact .check {
    width: 15px;
    height: 15px;
    font-size: 9px;
}

.compact .name { font-size: 11px; }
.compact .chip { font-size: 7px; padding: 3px 4px; }
.compact .status { font-size: 7px; padding: 4px 5px; }
.compact .love-btn { width: 17px; height: 17px; font-size: 10px; border-radius: 7px; }

.compact .desc, .compact .legend { display: none; }

.compact .add-card {
    min-height: 55px;
    padding: 6px 7px;
    font-size: 11px;
}

@media (max-width: 900px) {
    .page { padding: 12px 0 20px; }
    .header, .toolbar { grid-template-columns: 1fr; display: flex; flex-direction: column; align-items: stretch; }
    .counts { width: 100%; flex-wrap: wrap; }
    .count { flex: 1; min-width: calc(50% - 4px); }
    .grid, .compact .grid { grid-template-columns: repeat(2, 1fr); }
    .item:nth-child(6n) { border-right: 1px solid #e3d5c1; }
    .item:nth-child(2n) { border-right: 0; }
    .status-board { grid-template-columns: 1fr; }
    h1 { font-size: 22px; }
    .legend { gap: 6px; }
}

@media (max-width: 480px) {
    .grid, .compact .grid { grid-template-columns: 1fr; }
    .item { border-right: 0 !important; }
    .counts { gap: 5px; }
    .count { min-width: calc(50% - 3px); padding: 6px; }
}

/* 편집 모드 */
#editModeBtn.active {
    background: #e05f86;
    border-color: #e05f86;
    color: #fff;
}

.delete-btn {
    display: none;
    position: absolute;
    top: 4px;
    left: 4px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #d6605c;
    color: #fff;
    border: none;
    font-size: 11px;
    line-height: 1;
    font-weight: 900;
    cursor: pointer;
    padding: 0;
    z-index: 2;
    box-shadow: 0 1px 3px rgba(0,0,0,.2);
}

.add-card {
    display: none;
    min-height: 60px;
    align-items: center;
    justify-content: center;
    padding: 7px 8px;
    border-right: 1px solid #e3d5c1;
    border-bottom: 1px solid #e3d5c1;
    background: #fdf8f1;
    cursor: pointer;
    color: #8a7d6d;
    font-size: 12px;
    font-weight: 900;
    transition: .15s ease;
}

.add-card:hover {
    background: #f3eadf;
    color: #3c372f;
}

.add-team-btn {
    display: none;
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border: 2px dashed var(--line);
    border-radius: 15px;
    background: #fffaf3;
    color: var(--sub);
    font-size: 12px;
    font-weight: 900;
    cursor: pointer;
    font-family: inherit;
}

.add-team-btn:hover {
    border-color: var(--love);
    color: var(--love);
}

.edit-mode .delete-btn,
.edit-mode .add-card,
.edit-mode .add-team-btn {
    display: flex;
}

.edit-mode .item {
    padding-left: 22px;
}

/* PNG 캡처 시 편집 UI 숨기기 */
.capturing .delete-btn,
.capturing .add-card,
.capturing .add-team-btn,
.capturing .toolbar,
.capturing .legend {
    display: none !important;
}

.capturing .item {
    padding-left: 8px !important;
}

/* 모달 */
.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(60, 55, 47, .45);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.modal-overlay.show {
    display: flex;
}

.modal {
    background: var(--paper);
    border-radius: 16px;
    padding: 22px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 50px rgba(60, 55, 47, .25);
}

.modal h3 {
    margin: 0 0 16px;
    font-size: 16px;
    letter-spacing: -.03em;
}

.modal label {
    display: block;
    font-size: 10px;
    font-weight: 900;
    color: var(--sub);
    margin-bottom: 4px;
    margin-top: 10px;
    letter-spacing: .03em;
}

.modal label:first-of-type {
    margin-top: 0;
}

.modal input,
.modal select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--paper2);
    font-family: inherit;
    font-size: 13px;
    color: var(--ink);
}

.modal input:focus,
.modal select:focus {
    outline: none;
    border-color: var(--love);
}

.modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 18px;
    justify-content: flex-end;
}

.modal-actions button {
    padding: 8px 14px;
    font-size: 12px;
}
</style>
</head>
<body>
<div class="page">
    <main id="capture-area">
        <div class="header">
            <div>
                <h1>CHARACTER PLAY LIST</h1>
            </div>
            <div class="counts">
                <div class="count"><span>플레이</span><b id="playCount">0</b></div>
                <div class="count"><span>예정</span><b id="planCount">0</b></div>
                <div class="count"><span>미플레이</span><b id="newCount">0</b></div>
                <div class="count"><span>애정</span><b id="loveCount">0</b></div>
            </div>
        </div>

        <div class="toolbar">
            <div class="tabs">
                <button class="active" id="tab-group" onclick="setMode('group')">팀별</button>
                <button id="tab-status" onclick="setMode('status')">상태별</button>
                <button id="tab-attr" onclick="setMode('attr')">속성별</button>
                <button id="tab-love" onclick="setMode('love')">애정</button>
            </div>
            <div class="actions">
                <button onclick="toggleCompact()">작게/보통</button>
                <button onclick="toggleEditMode()" id="editModeBtn">편집</button>
                <button onclick="resetAll()">초기화</button>
                <button class="primary" onclick="savePNG()">PNG 저장</button>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item"><span class="status-sample play">색</span> 플레이</div>
            <div class="legend-item"><span class="status-sample plan">색</span> 플레이 예정</div>
            <div class="legend-item"><span class="status-sample new">색</span> 미플레이</div>
            <div class="legend-item"><span class="status-sample love">LOVE</span> 애정 캐릭터</div>
        </div>

        <div id="content"></div>
    </main>
</div>

<div class="modal-overlay" id="charModal">
    <div class="modal">
        <h3 id="modalTitle">캐릭터 추가</h3>
        <label>이름</label>
        <input type="text" id="charName" placeholder="캐릭터 이름" />
        <label>팀</label>
        <select id="charTeam"></select>
        <label>등급</label>
        <select id="charRank">
            <option>SS</option>
            <option>S</option>
            <option>A</option>
            <option>B</option>
            <option>C</option>
        </select>
        <label>속성</label>
        <select id="charAttr">
            <option>물</option>
            <option>불</option>
            <option>바람</option>
            <option>얼음</option>
            <option>번개</option>
            <option>풀</option>
            <option>무속성</option>
        </select>
        <div class="modal-actions">
            <button onclick="closeModal()">취소</button>
            <button class="primary" onclick="saveCharFromModal()">저장</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="teamModal">
    <div class="modal">
        <h3>새 팀 추가</h3>
        <label>팀 이름 (예: VANGUARD 3팀)</label>
        <input type="text" id="newTeamName" placeholder="팀 이름" />
        <label>팀 약자 (예: V3)</label>
        <input type="text" id="newTeamShort" placeholder="약자" maxlength="4" />
        <div class="modal-actions">
            <button onclick="closeTeamModal()">취소</button>
            <button class="primary" onclick="saveNewTeam()">추가</button>
        </div>
    </div>
</div>

<script>
const attrClass = {
    "물": "water", "불": "fire", "바람": "wind", "얼음": "ice",
    "번개": "lightning", "풀": "grass", "무속성": "neutral"

const statusClass = ["new", "plan", "play"];
const statusLabel = ["", "PLAN", "PLAY"];

let mode = "group";

let chars = [

    { g:"HARMONY CORE", short:"HC", rank:"A", n:"퓨어", a:"무속성", s:0, love:false },
    { g:"HARMONY CORE", short:"HC", rank:"S", n:"밴스", a:"풀", s:0, love:false }

// 팀 메타 정보 (순서 + 약자)
let teamOrder = [
    { name: "ARCH-PRIMA", short: "AP" },
    { name: "VANGUARD 1팀", short: "V1" },
    { name: "VANGUARD 2팀", short: "V2" },
    { name: "AGENT", short: "AG" },
    { name: "ACOLYTE", short: "AC" },
    { name: "HARMONY SUPPORT", short: "HS" },
    { name: "HARMONY R.S.T", short: "HR" },
    { name: "HARMONY CORE", short: "HC" }
];

let editingChar = null; // 편집 중인 캐릭터

function load() {
    // 진행 상태 불러오기 (기존 호환)
    const saved = localStorage.getItem("character-list-archive-love-progress");
    if (saved) {
        try {
            const data = JSON.parse(saved);
            chars.forEach(c => {
                if (data[c.n]) {
                    if (typeof data[c.n].s === "number") c.s = data[c.n].s;
                    if (typeof data[c.n].love === "boolean") c.love = data[c.n].love;
                }
            });
        } catch(e) {}
    }
    // 캐릭터 목록 자체 + 팀 목록 불러오기
    const savedData = localStorage.getItem("character-list-archive-data");
    if (savedData) {
        try {
            const obj = JSON.parse(savedData);
            if (Array.isArray(obj.chars)) chars = obj.chars;
            if (Array.isArray(obj.teamOrder)) teamOrder = obj.teamOrder;
        } catch(e) {}
    }
}

function save() {
    // 진행 상태 (기존 호환)
    const data = {};
    chars.forEach(c => data[c.n] = { s: c.s, love: c.love });
    localStorage.setItem("character-list-archive-love-progress", JSON.stringify(data));
    // 캐릭터 목록 + 팀 목록 전체
    localStorage.setItem("character-list-archive-data", JSON.stringify({
        chars: chars,
        teamOrder: teamOrder
    }));
}

function setMode(next) {
    mode = next;
    document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
    document.getElementById("tab-" + next).classList.add("active");
    render();
}

function toggleCompact() {
    document.getElementById("capture-area").classList.toggle("compact");
}

function updateCounts() {
    playCount.textContent = chars.filter(c => c.s === 2).length;
    planCount.textContent = chars.filter(c => c.s === 1).length;
    newCount.textContent = chars.filter(c => c.s === 0).length;
    loveCount.textContent = chars.filter(c => c.love).length;
}

function groupProgress(list) {
    const played = list.filter(c => c.s === 2).length;
    return `${played}/${list.length} 플레이`;
}

function makeItem(c) {
    const item = document.createElement("div");
    item.className = "item " + statusClass[c.s] + (c.love ? " love" : "");
    item.innerHTML = `
        <button type="button" class="delete-btn" title="삭제" aria-label="삭제">×</button>
        <div class="check">${checkMark[c.s]}</div>
        <div>
            <div class="name-row">
                <div class="name">${c.n}</div>
            </div>
            <div class="meta">
                <div class="meta-row">
                    <span class="chip ${attrClass[c.a]}">${c.a}</span>
                    <span class="chip rank">${c.rank}</span>
                </div>
                <span class="chip team" title="${c.g}">${c.g}</span>
            </div>
        </div>
        <div class="right-tools">
            <button type="button" class="love-btn" title="애정 캐릭터 체크" aria-label="애정 캐릭터 체크">♥</button>
        </div>
    `;

    item.onclick = () => {
        if (document.getElementById("capture-area").classList.contains("edit-mode")) {
            openEditModal(c);
            return;
        }
        c.s = (c.s + 1) % 3;
        save();
        render();
    };

    item.querySelector(".love-btn").onclick = (e) => {
        e.stopPropagation();
        c.love = !c.love;
        save();
        render();
    };

    item.querySelector(".delete-btn").onclick = (e) => {
        e.stopPropagation();
        if (!confirm(`"${c.n}" 캐릭터를 삭제할까요?`)) return;
        const idx = chars.indexOf(c);
        if (idx > -1) chars.splice(idx, 1);
        save();
        render();
    };

    return item;
}

function section(title, list, teamName) {
    const wrap = document.createElement("section");
    wrap.className = "section";
    wrap.innerHTML = `
        <div class="section-head">
            <div class="section-title">
                ${title}
                <span class="team-progress">${groupProgress(list)}</span>
            </div>
            <div class="section-count">${list.length}명</div>
        </div>
        <div class="grid"></div>
    `;
    const grid = wrap.querySelector(".grid");
    list.forEach(c => grid.appendChild(makeItem(c)));

    // 편집 모드용 + 추가 카드 (팀별 모드에서만)
    if (teamName) {
        const addCard = document.createElement("div");
        addCard.className = "add-card";
        addCard.innerHTML = `+ 캐릭터 추가`;
        addCard.onclick = () => openAddModal(teamName);
        grid.appendChild(addCard);
    }

    return wrap;
}

function render() {
    updateCounts();

    const root = document.getElementById("content");
    root.innerHTML = "";

    if (mode === "group") {
        root.className = "";
        teamOrder.forEach(t => {
            root.appendChild(section(t.name, chars.filter(c => c.g === t.name), t.name));
        });
        // 팀 추가 버튼 (편집 모드에서만 보임)
        const addTeamBtn = document.createElement("button");
        addTeamBtn.type = "button";
        addTeamBtn.className = "add-team-btn";
        addTeamBtn.innerHTML = "+ 새 팀 추가";
        addTeamBtn.onclick = openTeamModal;
        root.appendChild(addTeamBtn);
    }

    if (mode === "status") {
        root.className = "status-board";
        root.appendChild(section("플레이", chars.filter(c => c.s === 2)));
        root.appendChild(section("플레이 예정", chars.filter(c => c.s === 1)));
        root.appendChild(section("미플레이", chars.filter(c => c.s === 0)));
    }

    if (mode === "attr") {
        root.className = "";
        ["물", "불", "바람", "얼음", "번개", "풀", "무속성"].forEach(a => {
            const list = chars.filter(c => c.a === a);
            if (list.length) root.appendChild(section(a + " 속성", list));
        });
    }

    if (mode === "love") {
        root.className = "";
        root.appendChild(section("애정 캐릭터", chars.filter(c => c.love)));
    }
}

function resetAll() {
    if (!confirm("모든 상태와 애정 체크를 초기화할까요?")) return;
    chars.forEach(c => { c.s = 0; c.love = false; });
    save();
    render();
}

function toggleEditMode() {
    const area = document.getElementById("capture-area");
    area.classList.toggle("edit-mode");
    document.getElementById("editModeBtn").classList.toggle("active");
}

function fillTeamSelect() {
    const sel = document.getElementById("charTeam");
    sel.innerHTML = "";
    teamOrder.forEach(t => {
        const opt = document.createElement("option");
        opt.value = t.name;
        opt.textContent = t.name;
        sel.appendChild(opt);
    });
}

function openAddModal(teamName) {
    editingChar = null;
    document.getElementById("modalTitle").textContent = "캐릭터 추가";
    fillTeamSelect();
    document.getElementById("charName").value = "";
    document.getElementById("charTeam").value = teamName || (teamOrder[0] && teamOrder[0].name) || "";
    document.getElementById("charRank").value = "S";
    document.getElementById("charAttr").value = "물";
    document.getElementById("charModal").classList.add("show");
    setTimeout(() => document.getElementById("charName").focus(), 50);
}

function openEditModal(c) {
    editingChar = c;
    document.getElementById("modalTitle").textContent = "캐릭터 편집";
    fillTeamSelect();
    document.getElementById("charName").value = c.n;
    document.getElementById("charTeam").value = c.g;
    document.getElementById("charRank").value = c.rank;
    document.getElementById("charAttr").value = c.a;
    document.getElementById("charModal").classList.add("show");
}

function closeModal() {
    document.getElementById("charModal").classList.remove("show");
    editingChar = null;
}

function saveCharFromModal() {
    const name = document.getElementById("charName").value.trim();
    const team = document.getElementById("charTeam").value;
    const rank = document.getElementById("charRank").value;
    const attr = document.getElementById("charAttr").value;

    if (!name) {
        alert("이름을 입력해주세요.");
        return;
    }

    // 팀 약자 찾기
    const teamInfo = teamOrder.find(t => t.name === team);
    const short = teamInfo ? teamInfo.short : "";

    if (editingChar) {
        // 편집
        editingChar.n = name;
        editingChar.g = team;
        editingChar.short = short;
        editingChar.rank = rank;
        editingChar.a = attr;
    } else {
        // 신규 추가 - 중복 체크
        if (chars.some(c => c.n === name)) {
            if (!confirm(`"${name}" 이름의 캐릭터가 이미 있어요. 그래도 추가할까요?`)) return;
        }
        chars.push({
            g: team, short: short, rank: rank, n: name, a: attr,
            s: 0, love: false
        });
    }

    save();
    closeModal();
    render();
}

function openTeamModal() {
    document.getElementById("newTeamName").value = "";
    document.getElementById("newTeamShort").value = "";
    document.getElementById("teamModal").classList.add("show");
    setTimeout(() => document.getElementById("newTeamName").focus(), 50);
}

function closeTeamModal() {
    document.getElementById("teamModal").classList.remove("show");
}

function saveNewTeam() {
    const name = document.getElementById("newTeamName").value.trim();
    const short = document.getElementById("newTeamShort").value.trim();

    if (!name) {
        alert("팀 이름을 입력해주세요.");
        return;
    }
    if (teamOrder.some(t => t.name === name)) {
        alert("같은 이름의 팀이 이미 있어요.");
        return;
    }

    teamOrder.push({ name: name, short: short || name.substring(0, 2).toUpperCase() });
    save();
    closeTeamModal();
    render();
}

// 모달 바깥 클릭 시 닫기
document.addEventListener("click", (e) => {
    if (e.target.id === "charModal") closeModal();
    if (e.target.id === "teamModal") closeTeamModal();
});

// ESC 키로 모달 닫기
document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
        closeModal();
        closeTeamModal();
    }
});

function savePNG() {
    const target = document.querySelector("#capture-area");
    const originalShadow = target.style.boxShadow;
    target.style.boxShadow = "none";
    target.classList.add("capturing");

    html2canvas(target, {
        backgroundColor: "#fffefa",
        scale: 3,
        useCORS: true,
        windowWidth: 1080
    }).then(canvas => {
        target.style.boxShadow = originalShadow;
        target.classList.remove("capturing");
        const link = document.createElement("a");
        link.download = "character-list-archive.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
    }).catch(err => {
        target.style.boxShadow = originalShadow;
        target.classList.remove("capturing");
        console.error(err);
    });
}

load();
render();
</script>
</body>
</html>
